name = "retreat-portal"
account_id = "9dbefd5c67069aa84dbc395946c55839"
compatibility_date = "2025-05-30"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "attendance_db"
database_id = "19c293e9-c7b2-4fb6-bbee-e7960698cd8d"

# Pages configuration
[build]
command = "echo 'No build needed'"
publish = "frontend/public"

# Environment variables
[vars]
PORTAL_URL = "https://retreat.cloverleafchristiancentre.org"
RETREAT_NAME = "Growth and Wisdom Retreat"

# Cloudflare Email Send binding.
# remote=true means `wrangler pages dev` sends real email through Cloudflare's
# service rather than stubbing locally — matches the Resend-era behaviour that
# the rest of the codebase (welcome emails, reminders, allergy forms) expects.
# Requires the FROM_EMAIL domain to be onboarded in the Cloudflare dashboard
# under Email Service → Email Sending, with SPF/DKIM/DMARC records added.
[[send_email]]
name = "EMAIL"
remote = true