name = "retreat-portal"
account_id = "9dbefd5c67069aa84dbc395946c55839"
compatibility_date = "2025-05-30"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "attendance_db"
database_id = "19c293e9-c7b2-4fb6-bbee-e7960698cd8d"

# Pages configuration
[build]
command = "echo 'No build needed'"
publish = "frontend/public"

# Environment variables
[vars]
PORTAL_URL = "https://retreat.cloverleafchristiancentre.org"
RETREAT_NAME = "Growth and Wisdom Retreat"

# Cloudflare Email Send binding.
# remote=true means `wrangler pages dev` sends real email through Cloudflare's
# service rather than stubbing locally — matches the Resend-era behaviour that
# the rest of the codebase (welcome emails, reminders, allergy forms) expects.
# Requires the FROM_EMAIL domain to be onboarded in the Cloudflare dashboard
# under Email Service → Email Sending, with SPF/DKIM/DMARC records added.
[[send_email]]
name = "EMAIL"
remote = true

# Flexible-installment cron reminders (migration 021).
# /api/cron/send-installment-reminders is guarded by env.CRON_SECRET and
# must be hit daily by an external scheduler — Pages Functions don't run
# their own cron triggers. Suggested wiring:
#   * cron-job.org / GitHub Actions: POST with header
#       X-Cron-Secret: <value of CRON_SECRET>
#     to https://<portal>/api/cron/send-installment-reminders
#     daily around 09:00 local time
#   * Cloudflare worker: deploy a tiny companion Worker with a [triggers]
#     crons entry that does the same POST
# Set CRON_SECRET, plus BANK_ACCOUNT_NAME / BANK_SORT_CODE /
# BANK_ACCOUNT_NUMBER for the per-installment bank-transfer flow, via
# `wrangler pages secret put` (NOT in this file — they're secrets).