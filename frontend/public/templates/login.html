<div class="modern-login-page">
    <div class="login-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-card">
        <!-- Logo & Branding -->
        <div class="login-card-header">
            <img src="logo.png" alt="Retreat Logo" class="login-logo">
            <h1 class="login-title">Growth & Wisdom</h1>
            <p class="login-subtitle">Family Retreat 2026</p>
            <div class="login-theme-pill">"The Abundant Life"</div>
        </div>

        <!-- Alert -->
        <div id="login-alert" class="alert alert-error hidden"></div>

        <!-- Login Form -->
        <form id="login-form" class="modern-login-form">
            <div class="modern-form-group">
                <label for="login-ref">Reference Number</label>
                <div class="modern-input-wrap">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="login-ref" name="ref" required
                           placeholder="e.g. REF290001" autocomplete="username">
                </div>
            </div>

            <div class="modern-form-group">
                <label for="login-password">Password</label>
                <div class="modern-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" name="password" required
                           placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="modern-pw-toggle" id="toggle-password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="modern-btn-primary" id="login-btn">
                <span id="login-text">Sign In</span>
                <i class="fas fa-arrow-right"></i>
                <div id="login-spinner" class="loading-spinner hidden"></div>
            </button>
        </form>

        <!-- Divider -->
        <div class="modern-divider"><span>or</span></div>

        <!-- Register -->
        <a href="/register" class="modern-btn-outline">
            <i class="fas fa-user-plus"></i> Register for Retreat
        </a>

        <!-- Retreat Info -->
        <div class="login-info-bar">
            <span><i class="fas fa-calendar-alt"></i> Jul 31 – Aug 2, 2026</span>
            <span class="info-dot"></span>
            <span><i class="fas fa-map-marker-alt"></i> The Hayes, Derbyshire</span>
        </div>

        <!-- Admin link -->
        <div class="login-bottom-link">
            <a href="#" id="admin-link"><i class="fas fa-shield-alt"></i> Admin Access</a>
        </div>
    </div>

    <div class="login-page-footer">
        &copy; 2026 Cloverleaf Christian Centre
    </div>
</div>
