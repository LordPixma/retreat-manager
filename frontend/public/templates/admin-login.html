<div class="modern-login-page admin-login-page">
    <div class="login-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-card">
        <!-- Logo & Branding -->
        <div class="login-card-header">
            <img src="logo.png" alt="Retreat Logo" class="login-logo">
            <div class="admin-badge-modern"><i class="fas fa-shield-alt"></i> Administrator</div>
            <h1 class="login-title">Admin Portal</h1>
            <p class="login-subtitle">Manage retreat operations & communications</p>
        </div>

        <!-- Alert -->
        <div id="admin-login-alert" class="alert alert-error hidden"></div>

        <!-- Login Form -->
        <form id="admin-login-form" class="modern-login-form">
            <div class="modern-form-group">
                <label for="admin-user">Username</label>
                <div class="modern-input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="admin-user" name="user" required
                           placeholder="Enter admin username" autocomplete="username">
                </div>
            </div>

            <div class="modern-form-group">
                <label for="admin-pass">Password</label>
                <div class="modern-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="admin-pass" name="pass" required
                           placeholder="Enter admin password" autocomplete="current-password">
                    <button type="button" class="modern-pw-toggle" id="toggle-admin-password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="modern-btn-primary" id="admin-login-btn">
                <span id="admin-login-text">Sign In</span>
                <i class="fas fa-arrow-right"></i>
                <div id="admin-login-spinner" class="loading-spinner hidden"></div>
            </button>
        </form>

        <!-- Back link -->
        <div class="login-bottom-link" style="margin-top: 2rem;">
            <a href="#" id="attendee-link"><i class="fas fa-arrow-left"></i> Back to Attendee Login</a>
        </div>
    </div>

    <div class="login-page-footer">
        &copy; 2026 Cloverleaf Christian Centre
    </div>
</div>
