<div class="modal-overlay" id="activity-team-modal">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3 class="modal-title" id="activity-team-modal-title">Create Activity Team</h3>
            <button type="button" class="modal-close" id="close-activity-team-modal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div id="activity-team-modal-alert" class="alert alert-error hidden"></div>
            <form id="activity-team-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="team-name" class="form-label">Team Name <span class="required">*</span></label>
                        <input type="text" id="team-name" name="name" class="form-input" required placeholder="e.g. Team Alpha">
                    </div>
                    <div class="form-group">
                        <label for="team-leader" class="form-label">Team Leader</label>
                        <select id="team-leader" name="leader_id" class="form-input">
                            <option value="">No leader assigned</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="team-description" class="form-label">Description</label>
                    <textarea id="team-description" name="description" class="form-input" rows="2" placeholder="Brief description of team activities..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Team Members</label>
                    <input type="search" id="team-member-search" class="form-input" placeholder="Search attendees..." style="margin-bottom: 0.75rem;">
                    <div id="team-member-list" style="max-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 0.5rem;">
                        <div class="loading-placeholder">Loading attendees...</div>
                    </div>
                    <small style="color: var(--text-tertiary); margin-top: 0.35rem; display: block;">
                        <span id="team-selected-count">0</span> members selected
                    </small>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancel-activity-team-modal">Cancel</button>
            <button type="submit" form="activity-team-form" class="btn btn-primary" id="save-activity-team">
                <span>Save Team</span>
            </button>
        </div>
    </div>
</div>
